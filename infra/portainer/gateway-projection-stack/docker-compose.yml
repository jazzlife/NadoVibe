name: nadovibe_gateway_projection

services:
  gateway:
    image: ${NADOVIBE_NODE_RUNTIME_IMAGE:-node:22-alpine}
    restart: unless-stopped
    working_dir: /app
    command: ["node", "apps/gateway/dist/server.js"]
    environment:
      GATEWAY_PORT: ${GATEWAY_PORT:-8080}
      CORE_CONTROL_PLANE_URL: ${CORE_CONTROL_PLANE_URL:-http://core-control-plane:8081}
      WORKSPACE_RUNTIME_URL: ${WORKSPACE_RUNTIME_URL:-http://workspace-runtime:8093}
      NADOVIBE_ENV_PROFILE: ${NADOVIBE_ENV_PROFILE:-local}
      NADOVIBE_IMAGE_TAG: ${NADOVIBE_IMAGE_TAG:-local}
      NADOVIBE_BUILD_VERSION: ${NADOVIBE_BUILD_VERSION:-0.1.0}
      NADOVIBE_GIT_SHA: ${NADOVIBE_GIT_SHA:-local}
      NADOVIBE_EVENT_SCHEMA_VERSION: ${NADOVIBE_EVENT_SCHEMA_VERSION:-1}
      NADOVIBE_MIGRATION_VERSION: ${NADOVIBE_MIGRATION_VERSION:-3}
      NADOVIBE_RELEASE_MANIFEST_PATH: /app/nadovibe.release.json
      APP_SERVER_PROTOCOL_VERSION: ${APP_SERVER_PROTOCOL_VERSION:-official-docs-2026-04-23}
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8080/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ${NADOVIBE_RUNTIME_CURRENT:-/data/docker_data/nadovibe/runtime/current}:/app:ro
      - nadovibe_gateway_logs:/var/log/nadovibe/gateway
    networks:
      - nadovibe_core_net

  projection-worker:
    image: ${NADOVIBE_NODE_RUNTIME_IMAGE:-node:22-alpine}
    restart: unless-stopped
    working_dir: /app
    command: ["node", "services/projection-worker/dist/server.js"]
    environment:
      PROJECTION_WORKER_PORT: ${PROJECTION_WORKER_PORT:-8094}
      CORE_CONTROL_PLANE_URL: ${CORE_CONTROL_PLANE_URL:-http://core-control-plane:8081}
      NADOVIBE_ENV_PROFILE: ${NADOVIBE_ENV_PROFILE:-local}
      NADOVIBE_IMAGE_TAG: ${NADOVIBE_IMAGE_TAG:-local}
      NADOVIBE_BUILD_VERSION: ${NADOVIBE_BUILD_VERSION:-0.1.0}
      NADOVIBE_GIT_SHA: ${NADOVIBE_GIT_SHA:-local}
      NADOVIBE_EVENT_SCHEMA_VERSION: ${NADOVIBE_EVENT_SCHEMA_VERSION:-1}
      NADOVIBE_MIGRATION_VERSION: ${NADOVIBE_MIGRATION_VERSION:-3}
      NADOVIBE_RELEASE_MANIFEST_PATH: /app/nadovibe.release.json
      APP_SERVER_PROTOCOL_VERSION: ${APP_SERVER_PROTOCOL_VERSION:-official-docs-2026-04-23}
    ports:
      - "${PROJECTION_WORKER_PORT:-8094}:8094"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8094/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ${NADOVIBE_RUNTIME_CURRENT:-/data/docker_data/nadovibe/runtime/current}:/app:ro
      - nadovibe_projection_logs:/var/log/nadovibe/projection-worker
    networks:
      - nadovibe_core_net

volumes:
  nadovibe_gateway_logs:
    name: nadovibe_gateway_logs
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${NADOVIBE_DATA_ROOT:-/data/docker_data/nadovibe}/logs/gateway
  nadovibe_projection_logs:
    name: nadovibe_projection_logs
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${NADOVIBE_DATA_ROOT:-/data/docker_data/nadovibe}/logs/projection-worker

networks:
  nadovibe_core_net:
    external: true
    name: nadovibe_core_net
