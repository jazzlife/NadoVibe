name: nadovibe_gateway_projection

services:
  gateway:
    image: ${NADOVIBE_GATEWAY_IMAGE:-nadovibe/gateway:${NADOVIBE_IMAGE_TAG:-local}}
    restart: unless-stopped
    command: ["node", "apps/gateway/dist/server.js"]
    environment:
      GATEWAY_PORT: ${GATEWAY_PORT:-8080}
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - nadovibe_gateway_logs:/var/log/nadovibe/gateway
    networks:
      - nadovibe_core_net

  projection-worker:
    image: ${NADOVIBE_PROJECTION_WORKER_IMAGE:-nadovibe/projection-worker:${NADOVIBE_IMAGE_TAG:-local}}
    restart: unless-stopped
    command: ["node", "services/projection-worker/dist/server.js"]
    environment:
      PROJECTION_WORKER_PORT: ${PROJECTION_WORKER_PORT:-8094}
    ports:
      - "${PROJECTION_WORKER_PORT:-8094}:8094"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8094/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - nadovibe_projection_logs:/var/log/nadovibe/projection-worker
    networks:
      - nadovibe_core_net

volumes:
  nadovibe_gateway_logs:
    name: nadovibe_gateway_logs
  nadovibe_projection_logs:
    name: nadovibe_projection_logs

networks:
  nadovibe_core_net:
    external: true
    name: nadovibe_core_net
