name: nadovibe_workspace_runtime

services:
  workspace-runtime:
    image: ${NADOVIBE_NODE_RUNTIME_IMAGE:-node:22-alpine}
    restart: unless-stopped
    working_dir: /app
    command: ["node", "services/workspace-runtime/dist/server.js"]
    environment:
      WORKSPACE_RUNTIME_PORT: ${WORKSPACE_RUNTIME_PORT:-8093}
      WORKSPACE_RUNTIME_DOCKER_ENABLED: ${WORKSPACE_RUNTIME_DOCKER_ENABLED:-true}
      DOCKER_SOCKET_PATH: ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}
      WORKSPACE_RUNTIME_WORKSPACE_BASE_DIR: ${WORKSPACE_RUNTIME_WORKSPACE_BASE_DIR:-/var/lib/nadovibe/workspaces}
      WORKSPACE_RUNTIME_FILE_LEASE_TTL_MS: ${WORKSPACE_RUNTIME_FILE_LEASE_TTL_MS:-600000}
      NADOVIBE_ENV_PROFILE: ${NADOVIBE_ENV_PROFILE:-local}
      NADOVIBE_IMAGE_TAG: ${NADOVIBE_IMAGE_TAG:-local}
      NADOVIBE_BUILD_VERSION: ${NADOVIBE_BUILD_VERSION:-0.1.0}
      NADOVIBE_GIT_SHA: ${NADOVIBE_GIT_SHA:-local}
      NADOVIBE_EVENT_SCHEMA_VERSION: ${NADOVIBE_EVENT_SCHEMA_VERSION:-1}
      NADOVIBE_MIGRATION_VERSION: ${NADOVIBE_MIGRATION_VERSION:-3}
      NADOVIBE_RELEASE_MANIFEST_PATH: /app/nadovibe.release.json
      APP_SERVER_PROTOCOL_VERSION: ${APP_SERVER_PROTOCOL_VERSION:-official-docs-2026-04-23}
    ports:
      - "${WORKSPACE_RUNTIME_PORT:-8093}:8093"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8093/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ${NADOVIBE_RUNTIME_CURRENT:-/data/docker_data/nadovibe/runtime/current}:/app:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - nadovibe_repositories:/var/lib/nadovibe/repositories
      - nadovibe_workspaces:/var/lib/nadovibe/workspaces
      - nadovibe_artifacts:/var/lib/nadovibe/artifacts
      - nadovibe_workspace_logs:/var/log/nadovibe/workspace-runtime
    networks:
      - nadovibe_core_net

volumes:
  nadovibe_repositories:
    external: true
    name: nadovibe_repositories
  nadovibe_workspaces:
    external: true
    name: nadovibe_workspaces
  nadovibe_artifacts:
    name: nadovibe_artifacts
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${NADOVIBE_DATA_ROOT:-/data/docker_data/nadovibe}/artifacts
  nadovibe_workspace_logs:
    name: nadovibe_workspace_logs
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${NADOVIBE_DATA_ROOT:-/data/docker_data/nadovibe}/logs/workspace-runtime

networks:
  nadovibe_core_net:
    external: true
    name: nadovibe_core_net
