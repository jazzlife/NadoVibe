name: nadovibe_ops_observability

services:
  ops-health:
    image: ${NADOVIBE_NODE_RUNTIME_IMAGE:-node:22-alpine}
    restart: unless-stopped
    working_dir: /app
    command: ["node", "apps/web/dist/server.js"]
    environment:
      WEB_PORT: ${OPS_HEALTH_PORT:-8099}
      NADOVIBE_ENV_PROFILE: ${NADOVIBE_ENV_PROFILE:-local}
      NADOVIBE_IMAGE_TAG: ${NADOVIBE_IMAGE_TAG:-local}
      NADOVIBE_BUILD_VERSION: ${NADOVIBE_BUILD_VERSION:-0.1.0}
      NADOVIBE_GIT_SHA: ${NADOVIBE_GIT_SHA:-local}
      NADOVIBE_EVENT_SCHEMA_VERSION: ${NADOVIBE_EVENT_SCHEMA_VERSION:-1}
      NADOVIBE_MIGRATION_VERSION: ${NADOVIBE_MIGRATION_VERSION:-3}
      NADOVIBE_RELEASE_MANIFEST_PATH: /app/nadovibe.release.json
      APP_SERVER_PROTOCOL_VERSION: ${APP_SERVER_PROTOCOL_VERSION:-official-docs-2026-04-23}
    ports:
      - "${OPS_HEALTH_PORT:-8099}:8099"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8099/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ${NADOVIBE_RUNTIME_CURRENT:-/data/docker_data/nadovibe/runtime/current}:/app:ro
      - nadovibe_ops_logs:/var/log/nadovibe/ops
    networks:
      - nadovibe_core_net

  deployment-agent:
    image: ${NADOVIBE_NODE_RUNTIME_IMAGE:-node:22-alpine}
    restart: unless-stopped
    working_dir: /app
    command: ["node", "services/deployment-agent/dist/server.js"]
    environment:
      DEPLOYMENT_AGENT_PORT: ${DEPLOYMENT_AGENT_PORT:-8098}
      DOCKER_SOCKET_PATH: ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}
      NADOVIBE_RUNTIME_ROOT: /data/docker_data/nadovibe/runtime
      NADOVIBE_RELEASES_DIR: /data/docker_data/nadovibe/runtime/releases
      NADOVIBE_CURRENT_RELEASE_DIR: /data/docker_data/nadovibe/runtime/current
      NADOVIBE_RELEASE_MANIFEST_PATH: /app/nadovibe.release.json
      NADOVIBE_ENV_PROFILE: ${NADOVIBE_ENV_PROFILE:-local}
      NADOVIBE_IMAGE_TAG: ${NADOVIBE_IMAGE_TAG:-local}
      NADOVIBE_BUILD_VERSION: ${NADOVIBE_BUILD_VERSION:-0.1.0}
      NADOVIBE_GIT_SHA: ${NADOVIBE_GIT_SHA:-local}
      NADOVIBE_EVENT_SCHEMA_VERSION: ${NADOVIBE_EVENT_SCHEMA_VERSION:-1}
      NADOVIBE_MIGRATION_VERSION: ${NADOVIBE_MIGRATION_VERSION:-3}
      APP_SERVER_PROTOCOL_VERSION: ${APP_SERVER_PROTOCOL_VERSION:-official-docs-2026-04-23}
    ports:
      - "${DEPLOYMENT_AGENT_PORT:-8098}:8098"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8098/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ${NADOVIBE_RUNTIME_CURRENT:-/data/docker_data/nadovibe/runtime/current}:/app:ro
      - ${NADOVIBE_RUNTIME_ROOT:-/data/docker_data/nadovibe/runtime}:/data/docker_data/nadovibe/runtime:rw
      - /var/run/docker.sock:/var/run/docker.sock
      - nadovibe_ops_logs:/var/log/nadovibe/deployment-agent
    networks:
      - nadovibe_core_net

volumes:
  nadovibe_ops_logs:
    name: nadovibe_ops_logs
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${NADOVIBE_DATA_ROOT:-/data/docker_data/nadovibe}/logs/ops

networks:
  nadovibe_core_net:
    external: true
    name: nadovibe_core_net
